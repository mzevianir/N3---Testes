<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>GERENCIADOR DE TAREFAS</h1>
        </header>

        <main>
            <section class="form-section">
                <h2 id="form-title">Nova Tarefa</h2>
                <form id="tarefa-form">
                    <input type="hidden" id="tarefa-id">

                    <div class="form-group">
                        <label for="titulo">Título *</label>
                        <input type="text" id="titulo" placeholder="Ex: Documentar a API" required minlength="3"
                            maxlength="100">
                    </div>

                    <div class="form-group">
                        <label for="descricao">Descrição</label>
                        <textarea id="descricao" placeholder="Detalhes da tarefa..." maxlength="500"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="status">Status</label>
                            <select id="status">
                                <option value="PENDENTE">Pendente</option>
                                <option value="EM_ANDAMENTO">Em Andamento</option>
                                <option value="CONCLUIDA">Concluída</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="prioridade">Prioridade</label>
                            <select id="prioridade">
                                <option value="BAIXA">Baixa</option>
                                <option value="MEDIA" selected>Média</option>
                                <option value="ALTA">Alta</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="dataLimite">Data Limite</label>
                            <input type="date" id="dataLimite">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" id="btn-salvar" class="btn-primary">Salvar Tarefa</button>
                        <button type="button" id="btn-cancelar" class="btn-secondary" style="display: none;">Cancelar
                            Edição</button>
                    </div>
                </form>
            </section>

            <section class="search-section">
                <h2>Buscar Tarefa Por ID</h2>
                <div class="form-row" style="align-items: flex-end;">
                    <div class="form-group" style="margin-bottom: 0; flex-grow: 1;">
                        <label for="busca-id">ID da Tarefa</label>
                        <input type="number" id="busca-id" placeholder="Digite o ID para buscar a tarefa" min="1">
                    </div>
                    <div class="form-actions" style="margin-top: 0; margin-bottom: 2px;">
                        <button type="button" id="btn-buscar" class="btn-primary">Buscar</button>
                    </div>
                </div>
            </section>

            <section class="list-section">
                <h2>Lista de Tarefas</h2>
                <div id="lista-tarefas" class="tarefas-grid">
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
